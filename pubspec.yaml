name: ai_music_studio_app
description: "Kenny's Music Studio - AI 음악 생성 앱"
publish_to: 'none'
version: 2.1.0+2

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebView & 브라우저
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1

  # 네이티브 공유
  share_plus: ^10.1.4

  # 로컬 저장소
  shared_preferences: ^2.3.0

  # 네트워크 상태
  connectivity_plus: ^6.1.4

  # 파일 다운로드 & 저장
  path_provider: ^2.1.5
  http: ^1.2.2

  # 로컬 알림
  flutter_local_notifications: ^18.0.1

  # 권한 관리
  permission_handler: ^11.3.1

  # 딥링크
  app_links: ^6.3.3

  # 진동/햅틱 피드백
  vibration: ^2.0.0

  # 이미지 피커 (프로필 등)
  image_picker: ^1.1.2

  # 앱 배지
  flutter_app_badger: ^1.5.0

  # 패키지 정보
  package_info_plus: ^8.1.3

  # 인앱 리뷰
  in_app_review: ^2.0.10

  # 오디오 세션 (백그라운드 오디오 유지)
  audio_session: ^0.1.21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
