name: Build iOS & Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: "\U0001F916 Android APK"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: "\U0001F34E iOS IPA"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../KMS-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: KMS-unsigned.ipa

  notify:
    name: "\U0001F4E2 빌드 알림"
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send download links
        env:
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ANDROID_OK: ${{ needs.build-android.result }}
          IOS_OK: ${{ needs.build-ios.result }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          run_id = os.environ.get('RUN_ID', '')
          repo = os.environ.get('REPO', '')
          sha = os.environ.get('SHA', '')[:7]
          android = '✅' if os.environ.get('ANDROID_OK') == 'success' else '❌'
          ios = '✅' if os.environ.get('IOS_OK') == 'success' else '❌'

          base = f'https://nightly.link/mitiwood/ai-music-studio-flutter/actions/runs/{run_id}'

          msg = (
            f'📱 KMS Flutter v2.1 빌드 완료!\n'
            f'커밋: {sha}\n\n'
            f'{android} Android APK:\n{base}/android-apk.zip\n\n'
            f'{ios} iOS IPA:\n{base}/ios-ipa.zip\n\n'
            f'🆕 v2.1 변경사항:\n'
            f'- 네이티브 다운로드/공유 강화\n'
            f'- 백그라운드 오디오 유지\n'
            f'- 딥링크 지원\n'
            f'- 로컬 알림 (생성 완료/다운로드)\n'
            f'- 향상된 스플래시 화면\n'
            f'- 오프라인 감지 개선'
          )

          site = 'https://ai-music-studio-bice.vercel.app'

          # Telegram
          try:
            tg = json.dumps({'event':'build','data':{'message':msg}}).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type':'application/json; charset=utf-8','Authorization':'Bearer kenny2024!'}
            ), timeout=10)
            print('TG sent')
          except Exception as e:
            print(f'TG error: {e}')

          # Kakao
          try:
            kk = json.dumps({'text':msg}).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/kakao-notify', data=kk,
              headers={'Content-Type':'application/json; charset=utf-8'}
            ), timeout=10)
            print('KK sent')
          except Exception as e:
            print(f'KK error: {e}')
          PYEOF
