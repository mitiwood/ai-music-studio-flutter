name: Build iOS & Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: 🍎 iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../KMS-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: KMS-unsigned.ipa

  notify:
    name: 📢 빌드 알림
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send download links
        env:
          RUN_ID: ${{ github.run_id }}
          ANDROID_OK: ${{ needs.build-android.result }}
          IOS_OK: ${{ needs.build-ios.result }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          run_id = os.environ.get('RUN_ID', '')
          android = '✅' if os.environ.get('ANDROID_OK') == 'success' else '❌'
          ios = '✅' if os.environ.get('IOS_OK') == 'success' else '❌'

          base = f'https://nightly.link/mitiwood/ai-music-studio-flutter/actions/runs/{run_id}'

          msg = (
            f'📱 Flutter 빌드 완료!\n\n'
            f'{android} Android APK:\n{base}/android-apk.zip\n\n'
            f'{ios} iOS IPA:\n{base}/ios-ipa.zip'
          )

          site = 'https://ai-music-studio-bice.vercel.app'

          # Telegram
          try:
            tg = json.dumps({'event':'build','data':{'message':msg}}).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/telegram', data=tg,
              headers={'Content-Type':'application/json; charset=utf-8','Authorization':'Bearer kenny2024!'}
            ), timeout=10)
            print('TG sent')
          except Exception as e:
            print(f'TG error: {e}')

          # Kakao
          try:
            kk = json.dumps({'text':msg}).encode('utf-8')
            urllib.request.urlopen(urllib.request.Request(
              f'{site}/api/kakao-notify', data=kk,
              headers={'Content-Type':'application/json; charset=utf-8'}
            ), timeout=10)
            print('KK sent')
          except Exception as e:
            print(f'KK error: {e}')
          PYEOF
